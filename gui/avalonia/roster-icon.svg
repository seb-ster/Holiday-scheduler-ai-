<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect x="0" y="0" width="128" height="128" fill="#FFFFFF" rx="8"/>
  
  <!-- Header row background -->
  <rect x="4" y="4" width="120" height="20" fill="#F5F5F7" rx="4"/>
  
  <!-- Header text simulation (small rectangles for titles) -->
  <rect x="8" y="10" width="22" height="8" fill="#8E8E93" rx="2"/>
  <rect x="35" y="10" width="18" height="8" fill="#8E8E93" rx="2"/>
  <rect x="58" y="10" width="18" height="8" fill="#8E8E93" rx="2"/>
  <line x1="58" y1="19" x2="76" y2="19" stroke="#DCEBFF" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="81" y="10" width="18" height="8" fill="#8E8E93" rx="2"/>
  <rect x="104" y="10" width="18" height="8" fill="#8E8E93" rx="2"/>
  
  <!-- DATE column background (guide rail) -->
  <rect x="4" y="28" width="26" height="96" fill="#EEF2F7"/>
  
  <!-- Grid rows (simplified) -->
  <!-- Row 1 -->
  <line x1="4" y1="44" x2="124" y2="44" stroke="#B8B8B8" stroke-width="0.5"/>
  <rect x="8" y="32" width="14" height="8" fill="#6E6E73" rx="1"/>
  
  <!-- Row 2 -->
  <line x1="4" y1="60" x2="124" y2="60" stroke="#B8B8B8" stroke-width="0.5"/>
  <rect x="8" y="48" width="14" height="8" fill="#6E6E73" rx="1"/>
  
  <!-- Row 3 - HIGHLIGHTED ROW -->
  <rect x="4" y="60" width="120" height="16" fill="#DCEBFF"/>
  <rect x="4" y="60" width="4" height="16" fill="#0A84FF"/>
  <line x1="4" y1="76" x2="124" y2="76" stroke="#B8B8B8" stroke-width="0.5"/>
  <rect x="8" y="64" width="14" height="8" fill="#1D1D1F" rx="1"/>
  
  <!-- Row 4 -->
  <line x1="4" y1="92" x2="124" y2="92" stroke="#B8B8B8" stroke-width="0.5"/>
  <rect x="8" y="80" width="14" height="8" fill="#6E6E73" rx="1"/>
  
  <!-- Row 5 -->
  <line x1="4" y1="108" x2="124" y2="108" stroke="#B8B8B8" stroke-width="0.5"/>
  <rect x="8" y="96" width="14" height="8" fill="#6E6E73" rx="1"/>
  
  <!-- Row 6 -->
  <rect x="8" y="112" width="14" height="8" fill="#6E6E73" rx="1"/>
  
  <!-- Vertical separators for columns -->
  <line x1="30" y1="28" x2="30" y2="124" stroke="#B8B8B8" stroke-width="0.5" opacity="0.5"/>
  <line x1="53" y1="28" x2="53" y2="124" stroke="#B8B8B8" stroke-width="0.5" opacity="0.3"/>
  <line x1="76" y1="28" x2="76" y2="124" stroke="#B8B8B8" stroke-width="0.5" opacity="0.3"/>
  <line x1="99" y1="28" x2="99" y2="124" stroke="#B8B8B8" stroke-width="0.5" opacity="0.3"/>
</svg>
