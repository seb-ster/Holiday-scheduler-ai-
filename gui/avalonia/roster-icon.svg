<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7E9FF"/>
      <stop offset="58%" stop-color="#89C8FF"/>
      <stop offset="100%" stop-color="#4F95EA"/>
    </linearGradient>
    <linearGradient id="tileShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#1D4D8A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- macOS rounded app tile -->
  <rect x="72" y="72" width="880" height="880" rx="198" fill="url(#sky)"/>
  <rect x="72" y="72" width="880" height="880" rx="198" fill="url(#tileShine)"/>

  <!-- isolated island -->
  <g filter="url(#shadow)">
    <ellipse cx="512" cy="760" rx="280" ry="86" fill="#A8B0BC"/>
    <ellipse cx="512" cy="736" rx="238" ry="62" fill="#BDC5CF"/>
  </g>

  <!-- single bent palm tree (black silhouette) -->
  <g fill="#111111" stroke="#111111" stroke-linecap="round" stroke-linejoin="round">
    <!-- trunk -->
    <path d="M502 736 C492 676 502 612 540 552 C564 514 598 490 638 474" fill="none" stroke-width="26"/>

    <!-- fronds -->
    <path d="M640 474 C566 438 502 430 430 444 C502 458 568 490 620 536"/>
    <path d="M640 474 C578 408 520 370 438 344 C506 394 558 454 596 522"/>
    <path d="M640 474 C658 398 684 332 738 276 C714 362 694 434 654 522"/>
    <path d="M640 474 C706 428 778 406 854 412 C770 436 706 474 656 524"/>
    <path d="M640 474 C690 510 752 546 822 560 C742 562 684 548 642 522"/>
  </g>
</svg>
