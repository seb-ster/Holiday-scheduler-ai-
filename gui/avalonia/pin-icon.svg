<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64">
  <!-- Back square (shadow) -->
  <rect x="5" y="8" width="12" height="12" fill="#E0E0E0" rx="1" ry="1" opacity="0.5" />
  
  <!-- Front square (highlight color) -->
  <rect x="7" y="10" width="12" height="12" fill="#DCEBFF" stroke="#0A84FF" stroke-width="0.5" rx="1" ry="1" opacity="0.6" />
  
  <!-- Pin body -->
  <line x1="13" y1="4" x2="13" y2="14" stroke="#8E8E93" stroke-width="1.2" opacity="0.5" />
  
  <!-- Pin head (circle) -->
  <circle cx="13" cy="3.5" r="1.5" fill="#FF3B30" opacity="0.6" />
  
  <!-- Pin needle point -->
  <polygon points="12.5,14 13,15 13.5,14" fill="#6E6E73" opacity="0.5" />
</svg>
