name: DCO Check

on:
  pull_request:

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify DCO sign-off on commits
        run: |
          set -euo pipefail
          base=${{ github.base_ref }}
          echo "Base branch: $base"
          # Get commit range for the pull request
          if [ -n "$base" ]; then
            range="origin/$base..HEAD"
          else
            range="HEAD"
          fi
          echo "Checking commits in range: $range"
          for sha in $(git rev-list $range); do
            if ! git show -s --format=%B $sha | grep -q "Signed-off-by:"; then
              echo "Commit $sha is missing a Signed-off-by: line"
              git show -s --format="%h %s" $sha
              exit 1
            fi
          done
          echo "All commits include a Signed-off-by: line."
